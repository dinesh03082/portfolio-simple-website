<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <div class="container">
    <div class="sec__one">
            <h1 class="sec__one__name">Dinesh</h1>
            <p class="sec__one__role">web developer</p>
            <a class="sec__one__con" href="index.html">home</a>
    </div>
    <div class="contact-form">
        <form>
        <table>
            <tr>
                <td>name:</td>
                <td><input type="text" placeholder="enter your name" class="contact-form__input"></td>
            </tr>
            <tr>
                <td>email:</td>
                <td><input type="email" placeholder="enter your email" class="contact-form__input"></td>
            </tr>
            <tr>
                <td>message:</td>
                <td>
                    <textarea placeholder="message" class="contact-form__textarea"></textarea>
                </td>
            </tr>
            <tr>
                <td></td>
                <td><input type="submit" class="contact-form__submit"></td>
            </tr>
        </table>
    </form>

    </div>
    

     <div class="sec__five">
            <p class="sec__five__title">social media:
                <a href="www.instagram.com">instagram</a>
                <a href="www.linked in.com">linked in</a>
            <p class="sec__five__desc">&copy; Dinesh</p>

            </p>

        </div>

</body>
